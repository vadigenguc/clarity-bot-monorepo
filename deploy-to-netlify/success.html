<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D1117;
            color: #E6EDF3;
        }
        .gradient-text {
            background: linear-gradient(90deg, #30C6B8, #7A5AF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="text-center p-8">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
            <span class="gradient-text">Thank You!</span>
        </h1>
        <p class="text-lg text-gray-400">You've been added to the waitlist. We'll be in touch soon!</p>
        <div class="mt-8">
            <a href="/" class="text-teal-400 hover:text-teal-300 font-semibold">← Go Back to Homepage</a>
        </div>
    </div>
</body>
</html>
