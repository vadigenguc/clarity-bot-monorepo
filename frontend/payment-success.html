<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome, Founder!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D1117;
            color: #E6EDF3;
        }
        .gradient-text {
            background: linear-gradient(90deg, #30C6B8, #7A5AF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="text-center p-8">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
            <span class="gradient-text">Welcome, Founder!</span>
        </h1>
        <p class="text-lg text-gray-400 max-w-md mx-auto">Thank you for your support. Your payment was successful, and you are now officially a Founding Member of Clarity. We'll be in touch soon with exclusive updates and early access.</p>
        
        <div id="license-key-container" class="mt-8 p-6 bg-gray-800 rounded-lg max-w-md mx-auto hidden">
            <p class="text-gray-400 mb-2">Your License Key:</p>
            <div class="flex items-center justify-center space-x-2">
                <code id="license-key-display" class="text-lg font-mono bg-gray-900 p-2 rounded">Loading...</code>
                <button id="copy-button" class="px-3 py-2 bg-teal-500 text-white rounded hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:ring-opacity-75">Copy</button>
            </div>
            <p id="copy-feedback" class="text-sm text-green-400 mt-2 h-4"></p>
        </div>

        <div class="mt-8">
            <a href="/" class="text-teal-400 hover:text-teal-300 font-semibold">← Go Back to Homepage</a>
        </div>
    </div>

    <script>
        (async () => {
            const licenseContainer = document.getElementById('license-key-container');
            const licenseDisplay = document.getElementById('license-key-display');
            const copyButton = document.getElementById('copy-button');
            const copyFeedback = document.getElementById('copy-feedback');

            const params = new URLSearchParams(window.location.search);
            const clientReferenceId = params.get('client_reference_id');

            if (!clientReferenceId) {
                // If the ID is missing, we can't fetch the key.
                // Hide the container or show a specific message.
                return;
            }

            licenseContainer.classList.remove('hidden');

            try {
                const response = await fetch('/.netlify/functions/get-license-key', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ client_reference_id: clientReferenceId }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const licenseKey = data.license_key;

                licenseDisplay.textContent = licenseKey;

                copyButton.addEventListener('click', () => {
                    navigator.clipboard.writeText(licenseKey).then(() => {
                        copyFeedback.textContent = 'Copied!';
                        setTimeout(() => {
                            copyFeedback.textContent = '';
                        }, 2000);
                    }).catch(err => {
                        copyFeedback.textContent = 'Failed to copy.';
                        console.error('Failed to copy text: ', err);
                    });
                });

            } catch (error) {
                licenseDisplay.textContent = 'Error fetching key';
                licenseDisplay.classList.add('text-red-400');
                copyButton.disabled = true;
                copyButton.classList.add('opacity-50', 'cursor-not-allowed');
                console.error('Error:', error);
            }
        })();
    </script>
</body>
</html>
